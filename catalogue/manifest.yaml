apiVersion: apps/v1
Kind: ConfigMap
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: catalogue
data:
  MONGO: "true"
  MONGO_URL: "mongodb://mongodb:27017/catalogue"

---

apiVersion: apps/v1
Kind: Deployment
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: catalogue
  spec:
    replicas: 1
    selector:
      matchLabels:
        project: roboshop
        tier: backend
        component: catalogue   

    template:
      metadata:
        labels:
          project: roboshop
          tier: backend
          component: catalogue   
      spec:
        containers:
        - name: catalogue
          image: ayyappavedavyas/catalogue:1.0.0
          
          resources:
            requests:
              cpu: "100Mi"
              memory: "128Mi"
            limits:
              cpu: "100Mi"
              memory: "128Mi"

          readinessProbe:
            tcpSocket:
              port: 8080
            # httpGet:
            #   path: /health
            #   port: 8080
            failureThreshold: 3
            periodSeconds: 10
            intialDelaySeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 3
            periodSeconds: 10

          envFrom:
          - configMapRef: 
            name: catalogue

---
# cluster service
apiVersion: apps/v1
Kind: Service
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: catalogue    
  spec:
    selector: 
      project: roboshop
      tier: backend
      component: catalogue
    ports:
    - protocol: TCP
      port: 8080 # service port
      targetPort: 8080 # container port