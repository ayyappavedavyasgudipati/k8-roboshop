apiVersion: apps/v1
Kind: ConfigMap
metadata:
  name: rabbitmq
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: rabbitmq
data:
  RABBITMQ_DEFAULT_USER: roboshop
  RABBITMQ_DEFAULT_PASS: roboshop123
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: roboshop
  labels:
    project: roboshop
    tier: database
    component: rabbitmq

spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      tier: database
      component: rabbitmq

  template:        
    metadata:
      labels:
        project: roboshop
        tier: database
        component: rabbitmq
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3
        envFrom:
        - configMapRef:
            name: rabbitmq 

        imagePullPolicy: Always

apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: roboshop
  labels:
    project: roboshop
    tier: database
    component: rabbitmq
spec:
  selector:
    project: roboshop
    tier: database
    component: rabbitmq
  ports:
  - protocol: TCP
    port: 5672
    targetPort: 5672              