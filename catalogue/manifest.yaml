apiVersion: apps/v1
Kind: ConfigMap
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: catalogue
data:
  MONGO: "true"
  MONGO_URL: "mongodb://mongodb:27017/catalogue"

---

apiVersion: apps/v1
Kind: Deployment
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: catalogue
  spec:
    replicas: 1
    selector:
      matchLabels:
        project: roboshop
        tier: backend
        component: catalogue   

    template:
      metadata:
        labels:
          project: roboshop
          tier: backend
          component: catalogue   
      spec:
        containers:
        - name: catalogue
          image: ayyappavedavyas/catalogue:1.0.0
          envFrom:
          - configMapRef: 
            name: catalogue

---
# cluster service
apiVersion: apps/v1
Kind: Service
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: catalogue    
  spec:
    selector: 
      project: roboshop
      tier: backend
      component: catalogue
    ports:
    - protocol: TCP
      port: 8080 # service port
      targetPort: 8080 # container port