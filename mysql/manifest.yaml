apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: roboshop
  labels:
    project: roboshop
    tier: database
    component: mysql

spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      tier: database
      component: mysql

  template:        
    metadata:
      labels:
        project: roboshop
        tier: database
        component: mysql
    spec:
      containers:
      - name: mysql
        image: ayyappavedavyas/mysql:1.0.0    
        imagePullPolicy: Always

---

apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: roboshop
  labels:
    project: roboshop
    tier: database
    component: mysql
spec:
  selector:
    project: roboshop
    tier: database
    component: mysql
  ports:
  - protocol: TCP
    port: 3306
    targetPort: 3306              