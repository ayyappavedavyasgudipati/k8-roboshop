apiVersion: v1
kind: ConfigMap
metadata:
  name: shipping
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: shipping
data:
  CART_ENDPOINT: "cart:8080"
  DB_HOST: "mysql"

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: shipping
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      tier: backend
      component: shipping   

  template:
    metadata:
      labels:
        project: roboshop
        tier: backend
        component: shipping   
    spec:
      containers:
      - name: shipping
        image: ayyappavedavyas/shipping:1.0.0
        imagePullPolicy: Always
        
        resources:
          requests:
            cpu: "150m"
            memory: "256Mi"
          limits:
            cpu: "150m"
            memory: "256Mi"

        readinessProbe:
          tcpSocket:
            port: 8080
          # httpGet:
          #   path: /health
          #   port: 8080
          failureThreshold: 3
          periodSeconds: 10
          initialDelaySeconds: 15
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 30
          periodSeconds: 10  
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 3
          periodSeconds: 10

        envFrom:
        - configMapRef: 
            name: shipping

---
# cluster service
apiVersion: v1
kind: Service
metadata:
  name: shipping
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: shipping    
spec:
  selector: 
    project: roboshop
    tier: backend
    component: shipping
  ports:
  - protocol: TCP
    port: 8080 # service port
    targetPort: 8080 # container port